name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $tag = $env:GITHUB_REF -replace 'refs/tags/v',''
            $semver = $tag
          } else {
            $semver = '${{ github.event.inputs.version }}'
          }
          $msixVersion = if ($semver -match '^[0-9]+\.[0-9]+\.[0-9]+$') { "$semver.0" } else { "1.0.0.0" }
          "semver=$semver"          | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "msix_version=$msixVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        run: dotnet restore PromptNest.sln

      - name: Format
        run: dotnet format PromptNest.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build PromptNest.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test PromptNest.sln --configuration Release --no-build --collect:"XPlat Code Coverage" --settings coverlet.runsettings --results-directory artifacts/test-results

      - name: Coverage thresholds
        run: pwsh build\scripts\Test-CoverageThresholds.ps1

      - name: Package (portable ZIP + self-signed MSIX)
        env:
          PROMPTNEST_CERT_PASSWORD: ${{ secrets.PROMPTNEST_CERT_PASSWORD }}
        run: |
          pwsh build\scripts\New-Release.ps1 `
            -Configuration Release `
            -Platform x64 `
            -Version ${{ steps.ver.outputs.msix_version }} `
            -ArtifactsRoot artifacts/package `
            -SkipTests

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Velopack pack
        shell: pwsh
        run: |
          $publishDir = "src/PromptNest.App/bin/x64/Release/net8.0-windows10.0.19041.0/win-x64/publish"
          $velopackOut = "artifacts/velopack"
          New-Item -ItemType Directory -Force -Path $velopackOut | Out-Null
          vpk pack `
            --packId PromptNest `
            --packTitle PromptNest `
            --packVersion ${{ steps.ver.outputs.semver }} `
            --packAuthors "PromptNest Dev" `
            --packDir $publishDir `
            --mainExe PromptNest.App.exe `
            --runtime win-x64 `
            --outputDir $velopackOut

      - name: Verify release artifacts
        run: |
          pwsh build\scripts\Test-ReleaseArtifacts.ps1 `
            -PackageRoot artifacts/package `
            -VelopackRoot artifacts/velopack `
            -Version ${{ steps.ver.outputs.msix_version }} `
            -Platform x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: promptnest-release-${{ steps.ver.outputs.semver }}
          path: |
            artifacts/package/*.zip
            artifacts/package/*.msix
            artifacts/package/cert/*.cer
            artifacts/velopack/**

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: PromptNest ${{ steps.ver.outputs.semver }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.ver.outputs.semver, '-') }}
          files: |
            artifacts/package/*.zip
            artifacts/package/*.msix
            artifacts/package/cert/*.cer
            artifacts/velopack/*.nupkg
            artifacts/velopack/RELEASES
            artifacts/velopack/*.exe

      - name: Verify GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view v${{ steps.ver.outputs.semver }} --json tagName,name,isPrerelease,assets
